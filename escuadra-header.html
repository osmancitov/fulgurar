<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escuadra Osmancito — Geómetra del Corpus</title>
  <!-- v1.0 · 2026-03-16 · Encabezado Escuadra — paleta violeta pizarra -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;1,400&display=swap');

    :root {
      --ink:       #0e0e12;
      --stone:     #8a7fc8;
      --stone-dim: #5a5290;
      --chalk:     #eeeaf8;
      --vellum:    #f4f2fa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--vellum); font-family: 'EB Garamond', Georgia, serif; }

    /* ── HEADER ── */
    .escuadra-header {
      background: var(--ink);
      border-bottom: 3px solid var(--stone);
      position: relative;
      overflow: hidden;
    }

    /* textura de papel de dibujo técnico muy sutil */
    .escuadra-header::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(138,127,200,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(138,127,200,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* ── INNER ── */
    .header-inner {
      position: relative;
      max-width: 960px; margin: 0 auto;
      padding: 32px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── LOGOS ── */
    .header-logos {
      display: flex;
      align-items: flex-end;
      gap: 28px;
      margin-bottom: 22px;
    }

    .logo-escuadra {
      width: 68px;
      height: 68px;
      filter: drop-shadow(0 2px 10px rgba(138,127,200,0.4));
    }

    .logo-amanita {
      width: 68px;
      height: 68px;
    }

    /* ── ESCUADRA ANIMATIONS ── */
    .sq-body    { animation: sq-rotate  16s ease-in-out infinite; transform-origin: 36px 52px; }
    .sq-trace   { animation: sq-trace    4s ease-in-out infinite; }
    .sq-dot     { animation: sq-dot-pop  4s ease-in-out infinite; }
    .sq-glow    { animation: sq-glow     3s ease-in-out infinite; }
    .sq-grid    { animation: sq-grid-on  8s ease-in-out infinite; }

    @keyframes sq-rotate {
      0%   { transform: rotate(0deg);   }
      20%  { transform: rotate(0deg);   }
      25%  { transform: rotate(-90deg); }
      45%  { transform: rotate(-90deg); }
      50%  { transform: rotate(-180deg);}
      70%  { transform: rotate(-180deg);}
      75%  { transform: rotate(-270deg);}
      95%  { transform: rotate(-270deg);}
      100% { transform: rotate(-360deg);}
    }

    @keyframes sq-trace {
      0%,100% { stroke-dashoffset: 120; opacity: 0; }
      20%     { stroke-dashoffset: 120; opacity: 0; }
      40%     { stroke-dashoffset: 0;   opacity: 0.9; }
      80%     { stroke-dashoffset: 0;   opacity: 0.9; }
      95%     { stroke-dashoffset: 0;   opacity: 0; }
    }

    @keyframes sq-dot-pop {
      0%,30%  { r: 0;   opacity: 0; }
      45%     { r: 2.5; opacity: 1; }
      85%     { r: 2.5; opacity: 1; }
      100%    { r: 0;   opacity: 0; }
    }

    @keyframes sq-glow {
      0%,100% { opacity: 0.1; }
      50%     { opacity: 0.3; }
    }

    @keyframes sq-grid-on {
      0%,100% { opacity: 0.15; }
      50%     { opacity: 0.35; }
    }

    /* ── AMANITA ANIMATIONS ── */
    .am-stem   { animation: am-sway    5s   ease-in-out infinite; transform-origin: 50% 100%; }
    .am-cap    { animation: am-breathe 4s   ease-in-out infinite; transform-origin: 50% 80%; }
    .am-spots  { animation: am-pulse   3.5s ease-in-out infinite; }
    .am-glow   { animation: am-glow-m  4s   ease-in-out infinite; }
    .am-spores { animation: am-float   6s   ease-in-out infinite; }

    @keyframes am-sway    { 0%,100%{transform:rotate(-2deg)}   50%{transform:rotate(2deg)} }
    @keyframes am-breathe { 0%,100%{transform:scaleX(1) scaleY(1)} 50%{transform:scaleX(1.04) scaleY(0.97)} }
    @keyframes am-pulse   { 0%,100%{opacity:.9}  50%{opacity:1} }
    @keyframes am-glow-m  { 0%,100%{opacity:.15} 50%{opacity:.45} }
    @keyframes am-float   { 0%{transform:translateY(0) translateX(0);opacity:0} 30%{opacity:1} 100%{transform:translateY(-14px) translateX(4px);opacity:0} }

    /* ── TÍTULO ── */
    .header-title {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .header-title .escuadra {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(2rem, 7vw, 3.2rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--stone);
      line-height: 1;
      text-shadow: 0 1px 18px rgba(138,127,200,0.4);
    }

    .header-title .de {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(0.6rem, 1.8vw, 0.85rem);
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(238,234,248,0.38);
      margin-top: 5px;
    }

    .header-title .nombre {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: clamp(1.2rem, 4vw, 1.9rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--chalk);
      margin-top: 3px;
    }

    .header-title .subtitulo {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: clamp(0.7rem, 1.8vw, 0.88rem);
      letter-spacing: 0.18em;
      color: rgba(238,234,248,0.35);
      margin-top: 10px;
    }

    /* ── NAV ── */
    .escuadra-nav {
      border-top: 1px solid rgba(138,127,200,0.18);
      background: rgba(255,255,255,0.02);
      margin-top: 22px;
    }
    .nav-inner {
      max-width: 960px; margin: 0 auto; padding: 0 16px;
      display: flex; flex-wrap: wrap; justify-content: center; list-style: none;
    }
    .nav-inner li a {
      display: block; padding: 9px 14px;
      font-family: 'Cinzel', serif;
      font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(238,234,248,0.45); text-decoration: none;
      transition: color 0.2s, background 0.2s;
    }
    .nav-inner li a:hover { color: var(--stone); background: rgba(138,127,200,0.07); }

    /* preview */
    .demo-body {
      max-width: 960px; margin: 60px auto; padding: 0 24px;
      text-align: center; color: rgba(14,14,18,0.3);
      font-style: italic; font-size: 0.9rem;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     ENCABEZADO ESCUADRA
     Copiar desde aquí hasta </header>
═══════════════════════════════════════════════════════ -->
<header class="escuadra-header">
  <div class="header-inner">

    <!-- LOGOS -->
    <div class="header-logos">

      <!-- ESCUADRA -->
      <svg class="logo-escuadra" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Escuadra de precisión">
        <defs>
          <radialGradient id="sq-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#1a1830"/>
            <stop offset="100%" stop-color="#0a0a14"/>
          </radialGradient>
          <linearGradient id="sq-gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#8a7fc8"/>
            <stop offset="100%" stop-color="#5a5290"/>
          </linearGradient>
        </defs>

        <!-- fondo circular -->
        <circle cx="36" cy="36" r="33" fill="url(#sq-bg)" stroke="rgba(138,127,200,0.35)" stroke-width="1.2"/>

        <!-- glow exterior -->
        <ellipse class="sq-glow" cx="36" cy="36" rx="30" ry="30" fill="rgba(138,127,200,0.12)"/>

        <!-- cuadrícula de fondo — papel técnico -->
        <g class="sq-grid" stroke="rgba(138,127,200,0.3)" stroke-width="0.4">
          <line x1="10" y1="16" x2="62" y2="16"/>
          <line x1="10" y1="24" x2="62" y2="24"/>
          <line x1="10" y1="32" x2="62" y2="32"/>
          <line x1="10" y1="40" x2="62" y2="40"/>
          <line x1="10" y1="48" x2="62" y2="48"/>
          <line x1="10" y1="56" x2="62" y2="56"/>
          <line x1="16" y1="10" x2="16" y2="62"/>
          <line x1="24" y1="10" x2="24" y2="62"/>
          <line x1="32" y1="10" x2="32" y2="62"/>
          <line x1="40" y1="10" x2="40" y2="62"/>
          <line x1="48" y1="10" x2="48" y2="62"/>
          <line x1="56" y1="10" x2="56" y2="62"/>
        </g>

        <!-- ESCUADRA — cuerpo que rota -->
        <g class="sq-body">
          <!-- brazo vertical -->
          <rect x="33" y="12" width="6" height="40" rx="1"
                fill="url(#sq-gold)" opacity="0.9"/>
          <!-- brazo horizontal -->
          <rect x="33" y="46" width="22" height="6" rx="1"
                fill="url(#sq-gold)" opacity="0.9"/>
          <!-- ángulo recto marcado -->
          <path d="M39 46 L39 52 L33 52" stroke="rgba(238,234,248,0.5)" stroke-width="0.8" fill="none"/>
          <!-- marcas de medición en brazo vertical -->
          <line x1="33" y1="20" x2="35" y2="20" stroke="rgba(238,234,248,0.5)" stroke-width="0.6"/>
          <line x1="33" y1="28" x2="35" y2="28" stroke="rgba(238,234,248,0.5)" stroke-width="0.6"/>
          <line x1="33" y1="36" x2="36" y2="36" stroke="rgba(238,234,248,0.6)" stroke-width="0.8"/>
          <line x1="33" y1="44" x2="35" y2="44" stroke="rgba(238,234,248,0.5)" stroke-width="0.6"/>
          <!-- marcas de medición en brazo horizontal -->
          <line x1="47" y1="46" x2="47" y2="48" stroke="rgba(238,234,248,0.5)" stroke-width="0.6"/>
          <line x1="51" y1="46" x2="51" y2="48" stroke="rgba(238,234,248,0.5)" stroke-width="0.6"/>
          <line x1="55" y1="46" x2="55" y2="49" stroke="rgba(238,234,248,0.6)" stroke-width="0.8"/>
        </g>

        <!-- línea de trazo dorado — aparece y desaparece -->
        <line class="sq-trace"
              x1="14" y1="36" x2="58" y2="36"
              stroke="rgba(138,127,200,0.8)" stroke-width="1"
              stroke-dasharray="120" stroke-dashoffset="120"/>

        <!-- punto de hallazgo — aparece donde la línea cruza phi -->
        <circle class="sq-dot" cx="44" cy="36" r="0" fill="#8a7fc8"/>

        <!-- punto de pivote central -->
        <circle cx="36" cy="52" r="2.5" fill="#0a0a14" stroke="rgba(138,127,200,0.6)" stroke-width="0.8"/>
        <circle cx="36" cy="52" r="1"   fill="#8a7fc8" opacity="0.7"/>

      </svg>

      <!-- AMANITA -->
      <svg class="logo-amanita" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Amanita muscaria">
        <ellipse class="am-glow" cx="36" cy="36" rx="30" ry="28" fill="rgba(200,60,30,0.12)"/>
        <ellipse cx="36" cy="67" rx="10" ry="2.5" fill="rgba(0,0,0,0.3)"/>
        <g class="am-stem">
          <path d="M28 65 Q27 50 29 42 Q33 38 36 38 Q39 38 43 42 Q45 50 44 65Z" fill="url(#sg-sq)"/>
          <ellipse cx="36" cy="64" rx="9" ry="3.5" fill="#d4b896"/>
          <path d="M28 51 Q36 54 44 51" stroke="#c4a882" stroke-width="1.5" fill="none"/>
          <path d="M32 55 Q33 48 32 42" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" fill="none"/>
          <path d="M40 55 Q39 48 40 42" stroke="rgba(255,255,255,0.10)" stroke-width="0.8" fill="none"/>
        </g>
        <g class="am-cap">
          <path d="M22 42 Q36 46 50 42 Q44 38 36 38 Q28 38 22 42Z" fill="url(#gg-sq)" opacity="0.85"/>
          <path d="M12 42 Q14 28 36 20 Q58 28 60 42 Q48 47 36 48 Q24 47 12 42Z" fill="url(#cg-sq)"/>
          <path d="M12 42 Q24 45 36 46 Q48 45 60 42" stroke="rgba(120,30,10,0.6)" stroke-width="0.8" fill="none"/>
        </g>
        <g class="am-spots">
          <ellipse cx="36" cy="28" rx="5"   ry="4"   fill="rgba(255,252,245,0.88)" transform="rotate(-5,36,28)"/>
          <ellipse cx="25" cy="34" rx="3.5" ry="3"   fill="rgba(255,252,245,0.82)" transform="rotate(8,25,34)"/>
          <ellipse cx="47" cy="34" rx="3.5" ry="3"   fill="rgba(255,252,245,0.82)" transform="rotate(-8,47,34)"/>
          <ellipse cx="20" cy="40" rx="2.5" ry="2"   fill="rgba(255,252,245,0.70)"/>
          <ellipse cx="52" cy="40" rx="2.5" ry="2"   fill="rgba(255,252,245,0.70)"/>
          <ellipse cx="30" cy="24" rx="2"   ry="1.8" fill="rgba(255,252,245,0.65)" transform="rotate(5,30,24)"/>
          <ellipse cx="43" cy="25" rx="2"   ry="1.8" fill="rgba(255,252,245,0.65)" transform="rotate(-5,43,25)"/>
        </g>
        <g class="am-spores">
          <circle cx="42" cy="18" r="1"   fill="rgba(255,200,180,0.7)"/>
          <circle cx="28" cy="15" r="0.7" fill="rgba(255,200,180,0.5)"/>
          <circle cx="50" cy="22" r="0.8" fill="rgba(255,200,180,0.55)"/>
        </g>
        <defs>
          <radialGradient id="cg-sq" cx="45%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#e84030"/>
            <stop offset="55%"  stop-color="#c02818"/>
            <stop offset="100%" stop-color="#7a1008"/>
          </radialGradient>
          <linearGradient id="sg-sq" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#c8ad8a"/>
            <stop offset="50%"  stop-color="#e8d4b0"/>
            <stop offset="100%" stop-color="#b89870"/>
          </linearGradient>
          <linearGradient id="gg-sq" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#f0d4b0"/>
            <stop offset="100%" stop-color="#c4a882"/>
          </linearGradient>
        </defs>
      </svg>

    </div><!-- /header-logos -->

    <!-- TÍTULO -->
    <div class="header-title">
      <span class="escuadra">Escuadra</span>
      <span class="de">de</span>
      <span class="nombre">Osmancito</span>
      <span class="subtitulo">Geómetra del corpus</span>
    </div>

  </div><!-- /header-inner -->

  <!-- NAV -->
  <nav class="escuadra-nav" aria-label="Secciones">
    <ul class="nav-inner">
      <li><a href="#cifras">Cifras del Corpus</a></li>
      <li><a href="#densidad">Perfil de Densidad</a></li>
      <li><a href="#grafico">El Gráfico Principal</a></li>
      <li><a href="#red">Geometría de la Red</a></li>
      <li><a href="#proporciones">Geometría de las Proporciones</a></li>
      <li><a href="#vocabulario">Geometría del Vocabulario</a></li>
      <li><a href="#levantamiento">El Levantamiento</a></li>
    </ul>
  </nav>

</header>
<!-- ═══════════════════════════════════════════════════════
     FIN DEL ENCABEZADO ESCUADRA
═══════════════════════════════════════════════════════ -->

<div class="demo-body">↑ El levantamiento geométrico va aquí debajo.</div>

</body>
